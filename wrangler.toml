name = "job-finder-agent"
main = "src/index.ts"
compatibility_date = "2026-07-02"
account_id = "e2ca6e9ea4072fe37dbb20adff068dab"

[vars]
SENDER_EMAIL = "notifications@vatican-ticket-notifications.com"
RECIPIENT_EMAIL = "rees@fucius.ai"
JOB_FINDER_ADMIN_URL = "https://job-finder-agent.rees-e2c.workers.dev/admin"

[observability]
enabled = true
head_sampling_rate = 1

[triggers]
# Cloudflare cron uses UTC. 22:00 UTC = 08:00 Australia/Brisbane.
crons = ["0 22 * * *"]

[[queues.producers]]
queue = "job-finder-agent-runs"
binding = "JOB_FINDER_QUEUE"

[[queues.consumers]]
queue = "job-finder-agent-runs"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 0
max_concurrency = 1

[[d1_databases]]
binding = "DB"
database_name = "job-finder-agent"
database_id = "97dcc8f5-80c5-4b37-980b-a699141bba64"
migrations_dir = "drizzle"
